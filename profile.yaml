# Carbon Instrument Profile
# Generated from carbon-esp32-inst-531c.local  (CARBON ESP32-INSTRUMENT  s/n SN12345)

apiVersion: v1alpha1

identity:
  manufacturer: CARBON
  model: ESP32-INSTRUMENT
  identityCommand: "*IDN?"

metadata:
  description: CARBON ESP32-INSTRUMENT instrument

connection:
  terminator: "\n"
  bus:
    - type: lan
      defaultPort: 4880
      timeout: 5000

# TODO: fill in hardware capabilities (cannot be derived from commands alone)
# capabilities:
#   digital:
#     - name: GPIO
#       pins: [2, 4, 5, 13, 14, 18, 19, 21, 22, 23, 25, 26, 27, 32, 33]
#   analog:
#     - name: ADC
#       channels: [0, 1, 2, 3, 4, 5, 6, 7]
#       resolution: 12
#       maxVoltage: 3.3
#   serial:
#     - name: UART
#       ports: [1]
#       baudRates: [9600, 19200, 38400, 57600, 115200]

variables:
  mask:
    description: Enable register bitmask
    type: int
    default: 0
  pin:
    description: GPIO pin number
    type: int
    default: 2
  value:
    description: Output level (0 or 1)
    type: int
    default: 0
  direction:
    description: Pin direction
    type: enum
    options:
      - value: INPUT
        description: INPUT
      - value: OUTPUT
        description: OUTPUT
    default: OUTPUT
  channel:
    description: ADC1 channel (0=GPIO36..7=GPIO35)
    type: int
    default: 0
  baud:
    description: Baud rate
    type: int
    default: 115200
  data_bits:
    description: Data bits (5-8)
    type: int
    default: 8
  parity:
    description: Parity
    type: enum
    options:
      - value: NONE
        description: NONE
      - value: EVEN
        description: EVEN
      - value: ODD
        description: ODD
    default: NONE
  stop_bits:
    description: Stop bits (1 or 2)
    type: int
    default: 1

commands:
  identify:
    description: Identify instrument
    type: read
    group: IEEE488
    command: "*IDN?"
    response:
      type: enum
    timeout: 500

  reset:
    description: Reset to defaults
    type: write
    group: IEEE488
    command: "*RST"
    timeout: 1000

  clear_status:
    description: Clear status registers
    type: write
    group: IEEE488
    command: "*CLS"
    timeout: 500

  event_status_register:
    description: Read event status register
    type: read
    group: IEEE488
    command: "*ESR?"
    response:
      type: int
    timeout: 500

  event_status_enable_query:
    description: Read event status enable
    type: read
    group: IEEE488
    command: "*ESE?"
    response:
      type: int
    timeout: 500

  event_status_enable:
    description: Set event status enable mask
    type: write
    group: IEEE488
    command: "*ESE {mask}"
    timeout: 500

  operation_complete:
    description: Operation complete query
    type: read
    group: IEEE488
    command: "*OPC?"
    response:
      type: bool
    timeout: 500

  self_test:
    description: Self-test query
    type: read
    group: IEEE488
    command: "*TST?"
    response:
      type: int
    timeout: 2000

  wait:
    description: Wait to continue
    type: write
    group: IEEE488
    command: "*WAI"
    timeout: 500

  gpio_set:
    description: Set digital output level
    type: write
    group: GPIO
    command: "GPIO:SET {pin} {value}"
    timeout: 100

  gpio_get:
    description: Read digital pin level
    type: read
    group: GPIO
    command: "GPIO:GET? {pin}"
    response:
      type: bool
    timeout: 100

  gpio_config:
    description: Configure GPIO pin direction
    type: write
    group: GPIO
    command: "GPIO:CONFIG {pin} {direction}"
    timeout: 100

  adc_read:
    description: Read ADC channel voltage in volts
    type: read
    group: ADC
    command: "ADC:READ? {channel}"
    response:
      type: float
      unit: V
    timeout: 500

  uart_write:
    description: Write data to UART1
    type: write
    group: UART
    command: "UART:WRITE"
    timeout: 500

  uart_read:
    description: Read available bytes from UART1 (100ms timeout)
    type: read
    group: UART
    command: "UART:READ?"
    response:
      type: enum
    timeout: 500

  uart_config:
    description: Configure UART1 parameters
    type: write
    group: UART
    command: "UART:CONFIG {baud} {data_bits} {parity} {stop_bits}"
    timeout: 500

  error_query:
    description: Read error from SCPI error queue
    type: read
    group: IEEE488
    command: "SYST:ERR?"
    response:
      type: tuple
      fields:
        - name: code
          type: int
          description: Error code (0 = no error)
        - name: message
          type: enum
          description: Error message string
    timeout: 500

discovery:
  mdns:
    serviceType: _hislip._tcp
    txtRecords:
      model: ESP32-INSTRUMENT
      vendor: Carbon
      version: "1.0"
